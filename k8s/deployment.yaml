apiVersion: apps/v1
kind: Deployment
metadata:
  name: myfunctionapp-web
  namespace: myfunctionapp
  labels:
    app.kubernetes.io/name: myfunctionapp-web
    app.kubernetes.io/part-of: myfunctionapp
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: myfunctionapp-web
  template:
    metadata:
      labels:
        app: myfunctionapp-web
        app.kubernetes.io/name: myfunctionapp-web
        app.kubernetes.io/version: "1.0.0"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: myfunctionappnodejs-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 1000
