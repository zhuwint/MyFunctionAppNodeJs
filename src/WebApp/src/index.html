<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFunctionApp - Node.js</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Orbitron:wght@500;700;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon: #00f5ff;
    --neon2: #ff00e5;
    --neon3: #7000ff;
    --bg: #0a0a0f;
    --card-bg: rgba(15, 15, 30, 0.75);
    --text: #e0e0f0;
    --text-dim: #707090;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 20px;
  }

  .card {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(120, 120, 200, 0.18);
    border-radius: 24px;
    padding: 48px 36px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 8px 60px rgba(0, 0, 0, 0.5),
      0 0 80px rgba(100, 0, 255, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: box-shadow 0.6s ease, border-color 0.6s ease;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 24px;
    background: linear-gradient(135deg,
      var(--neon), var(--neon2), var(--neon3),
      var(--neon2), var(--neon));
    background-size: 400% 400%;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.6s ease;
    animation: borderGlow 4s ease infinite;
  }

  .card:hover::before { opacity: 0.35; }
  .card:hover {
    border-color: rgba(120, 120, 200, 0.35);
    box-shadow:
      0 8px 60px rgba(0, 0, 0, 0.5),
      0 0 120px rgba(100, 0, 255, 0.25);
  }

  @keyframes borderGlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--neon), var(--neon3));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    font-weight: 900;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    box-shadow: 0 0 30px rgba(0, 245, 255, 0.35);
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(0, 245, 255, 0.35); }
    50% { box-shadow: 0 0 50px rgba(255, 0, 229, 0.50); }
  }

  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .logo-text span {
    display: block;
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid;
    text-transform: uppercase;
  }
  .badge-func { color: var(--neon); border-color: rgba(0,245,255,0.3); background: rgba(0,245,255,0.06); }
  .badge-web  { color: var(--neon2); border-color: rgba(255,0,229,0.3); background: rgba(255,0,229,0.06); }
  .badge-node { color: #7ddc3f; border-color: rgba(125,220,63,0.3); background: rgba(125,220,63,0.06); }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 10px;
  }
  .title .t1 {
    background: linear-gradient(135deg, var(--neon), #a0e0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .title .t2 {
    background: linear-gradient(135deg, var(--neon2), #ff80ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .input-group input {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(120, 120, 200, 0.25);
    border-radius: 14px;
    padding: 14px 18px;
    color: #fff;
    font-size: 16px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: all 0.35s ease;
  }

  .input-group input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 24px rgba(0, 245, 255, 0.2), inset 0 0 24px rgba(0, 245, 255, 0.04);
    background: rgba(255, 255, 255, 0.06);
  }

  .input-group input::placeholder {
    color: rgba(180, 180, 210, 0.25);
    font-size: 14px;
  }

  .btn {
    padding: 14px 26px;
    border: none;
    border-radius: 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    transition: all 0.35s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--neon3), #5b00ff);
    color: #fff;
    box-shadow: 0 4px 30px rgba(112, 0, 255, 0.35);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 40px rgba(0, 245, 255, 0.45);
    background: linear-gradient(135deg, #6000ee, var(--neon3));
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(120, 120, 200, 0.25);
    color: var(--text-dim);
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--neon2);
    color: #fff;
  }

  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .result-area {
    margin-top: 28px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    text-align: center;
    word-break: break-all;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  .result-display.show {
    opacity: 1;
    transform: translateY(0);
  }

  .result-display .highlight {
    animation: resultShimmer 2s ease-in-out infinite;
    background: linear-gradient(90deg,
      var(--neon), var(--neon2), #ffa500, var(--neon2), var(--neon));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @keyframes resultShimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .typing-cursor {
    display: inline-block;
    width: 3px;
    height: 0.9em;
    background: var(--neon);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  .info-panel {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(120, 120, 200, 0.12);
  }
  .info-panel .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .info-panel code {
    display: block;
    font-size: 12px;
    color: var(--neon);
    background: rgba(0, 245, 255, 0.06);
    padding: 8px 14px;
    border-radius: 10px;
    margin-top: 4px;
    word-break: break-all;
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall 1.8s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(600px) rotate(720deg) scale(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 32px 20px; border-radius: 20px; }
    .title { font-size: 24px; }
    .input-group { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
    .result-display { font-size: 22px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="wrapper">
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">&infin;</div>
      <div class="logo-text"><span>MyFunctionApp</span>Node.js Edition</div>
    </div>

    <div class="badge-row">
      <span class="badge badge-func">Azure Functions</span>
      <span class="badge badge-web">Serverless</span>
      <span class="badge badge-node">Node.js v4</span>
    </div>

    <h1 class="title">
      <span class="t1">Refactor</span> &rarr;
      <span class="t2">Web Server</span>
    </h1>

    <p class="subtitle">
      Serverless Function on Azure<br>Same business logic.<br>Deploy anywhere, run everywhere.<br>
      <em style="color:rgba(255,255,255,0.25); font-size:11px">Azure Functions &bull; Node.js v4 &bull; Serverless</em>
    </p>

    <div class="input-group">
      <input
        id="usernameInput"
        type="text"
        placeholder="Enter your name..."
        maxlength="40"
        autocomplete="off"
      >
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="sendBtn">&#9654; Say Hello</button>
      <button class="btn btn-secondary" id="resetBtn">&#8635; Reset</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="result-display" id="resultDisplay"></div>
    </div>

    <div class="info-panel">
      <div class="label">API Endpoint</div>
      <code id="endpointCode">GET|POST /api/satdemofunc/{username}</code>
    </div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  let width, height;
  const particles = [];
  const mouse = { x: -9999, y: -9999 };
  const PARTICLE_COUNT = 80;
  const CONNECT_DIST = 140;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() {
      this.reset(true);
    }
    reset(initial) {
      this.x = initial ? Math.random() * width : (Math.random() > 0.5 ? 0 : width);
      this.y = initial ? Math.random() * height : (Math.random() > 0.5 ? 0 : height);
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = (Math.random() - 0.5) * 0.6;
      this.radius = Math.random() * 2 + 0.8;
      this.opacity = Math.random() * 0.5 + 0.15;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      const margin = 30;
      if (this.x < -margin || this.x > width + margin || this.y < -margin || this.y > height + margin) {
        this.reset(false);
      }
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 180) {
        const force = (1 - dist / 180) * 0.6;
        this.vx -= (dx / dist) * force * 0.3;
        this.vy -= (dy / dist) * force * 0.3;
      }
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (speed > 1.2) {
        this.vx = (this.vx / speed) * 1.2;
        this.vy = (this.vy / speed) * 1.2;
      }
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      const r = this.radius > 1.4 ? 120 : 255;
      const g = this.radius > 1.4 ? 100 : 200;
      const b = this.radius > 1.4 ? 255 : 255;
      ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  window.addEventListener('mousemove', function (e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseleave', function () {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECT_DIST) {
          const alpha = (1 - dist / CONNECT_DIST) * 0.18;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(120,140,220,${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(function (p) { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animate);
  }
  animate();

  // ── UI Logic ──
  var input = document.getElementById('usernameInput');
  var sendBtn = document.getElementById('sendBtn');
  var resetBtn = document.getElementById('resetBtn');
  var resultArea = document.getElementById('resultArea');
  var resultDisplay = document.getElementById('resultDisplay');
  var endpointCode = document.getElementById('endpointCode');

  function typeEffect(el, text, speed, callback) {
    var i = 0;
    el.textContent = '';
    function tick() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        setTimeout(tick, speed);
      } else if (callback) {
        callback();
      }
    }
    tick();
  }

  function spawnConfetti() {
    var colors = ['#00f5ff', '#ff00e5', '#7000ff', '#ffa500', '#7ddc3f', '#ff4488', '#f0f0f0'];
    for (var i = 0; i < 50; i++) {
      var el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + '%';
      el.style.top = -(Math.random() * 80 + 20) + 'px';
      el.style.width = (Math.random() * 8 + 4) + 'px';
      el.style.height = (Math.random() * 14 + 6) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random() * 1.2 + 1.2) + 's';
      el.style.animationDelay = Math.random() * 0.4 + 's';
      document.body.appendChild(el);
      setTimeout(function () { el.remove(); }, 2200);
    }
  }

  function showResult(username) {
    resultDisplay.classList.remove('show');
    endpointCode.textContent = 'GET|POST /api/satdemofunc/' + username;

    setTimeout(function () {
      var displayHTML = 'Hello <span class="highlight">' + username + '</span>!';
      resultDisplay.innerHTML = displayHTML;
      resultDisplay.classList.add('show');
      spawnConfetti();
    }, 100);
  }

  function isGreetingVisible() {
    return resultDisplay.textContent.trim().length > 0;
  }

  sendBtn.addEventListener('click', function () {
    var name = input.value.trim() || 'World';
    if (isGreetingVisible()) {
      resultDisplay.classList.remove('show');
      setTimeout(function () { showResult(name); }, 300);
    } else {
      showResult(name);
    }
  });

  resetBtn.addEventListener('click', function () {
    input.value = '';
    resultDisplay.classList.remove('show');
    endpointCode.textContent = 'GET|POST /api/satdemofunc/{username}';
    setTimeout(function () {
      resultDisplay.innerHTML = '';
    }, 400);
    input.focus();
  });

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') sendBtn.click();
  });

  (function autoGreet() {
    var match = location.pathname.match(/\/satdemofunc\/(.+)/);
    if (match) {
      var name = decodeURIComponent(match[1]);
      input.value = name;
      showResult(name);
    }
  })();

  input.focus();
})();
</script>

</body>
</html>
